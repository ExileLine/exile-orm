services:
  postgres:
    image: postgres:16-alpine
    container_name: exile-orm-postgres
    environment:
      POSTGRES_USER: ${EXILE_ORM_PG_USER:-exile}
      POSTGRES_PASSWORD: ${EXILE_ORM_PG_PASSWORD:-exile}
      POSTGRES_DB: ${EXILE_ORM_PG_DB:-exile_orm_test}
    ports:
      - "${EXILE_ORM_PG_PORT:-55432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${EXILE_ORM_PG_USER:-exile} -d ${EXILE_ORM_PG_DB:-exile_orm_test}",
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
